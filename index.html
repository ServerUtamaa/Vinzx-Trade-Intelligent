    <style>
      body {
        background-color: #050505;
        color: #e5e5e5;
        overflow: hidden; /* Prevent body scroll for the app-like feel */
        touch-action: manipulation; /* Improve touch response */
        -webkit-tap-highlight-color: transparent;
      }
      
      /* Custom scrollbar ONLY for specific areas (like Analysis Log) */
      .custom-scrollbar::-webkit-scrollbar {
        width: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #333;
        border-radius: 2px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: #555;
      }

      /* Hide scrollbar for main areas (The one that is annoying) */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;  /* IE and Edge */
        scrollbar-width: none;  /* Firefox */
      }

      .animate-pulse-fast {
        animation: pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }
      .animate-pulse-slow {
        animation: pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }
      /* Running Text Animation - Precise 0.5s Void Delay */
      @keyframes marquee {
        0% { transform: translateX(100%); }
        95.8% { transform: translateX(-130%); } /* Finish moving at ~11.5s (Text sinks) */
        100% { transform: translateX(-130%); } /* Hold in void for remaining ~0.5s */
      }
      .animate-marquee {
        display: inline-block;
        animation: marquee 12s linear infinite; /* Total cycle 12s */
        white-space: nowrap;
        padding-left: 100%; /* Start off-screen */
      }
      @keyframes scan-line {
        0% { transform: translateY(-100%); opacity: 0; }
        10% { opacity: 1; }
        90% { opacity: 1; }
        100% { transform: translateY(200px); opacity: 0; }
      }
      @keyframes shimmer-text { 
        0% { background-position: 200% center; } 
        100% { background-position: -200% center; } 
      }
      .animate-text-shimmer { 
        background-size: 200% auto; 
        animation: shimmer-text 4s linear infinite; 
      }
      @keyframes logo-shimmer {
        0% { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }
      .logo-shimmer {
        background: linear-gradient(90deg, #9333ea, #ffffff, #9333ea);
        background-size: 200% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        animation: logo-shimmer 3s infinite linear;
      }
    </style>
